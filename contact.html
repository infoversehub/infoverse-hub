<!DOCTYPE html>
<html x-data="infoVerse()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="t('contact') + ' | ' + t('brand')"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body :class="lang === 'ar' ? 'font-arabic' : 'font-sans'">
    <nav class="glass-nav h-20 flex items-center"><div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center"><a href="index.html" class="flex items-center gap-2"><div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-bold">IV</div><span class="text-2xl font-black text-slate-900" x-text="t('brand')"></span></a><button @click="toggleLang()" class="px-5 py-2 rounded-full bg-slate-900 text-white text-xs font-bold" x-text="lang === 'ar' ? 'English' : 'العربية'"></button></div></nav>
    <main class="max-w-2xl mx-auto px-4 py-20 text-center space-y-10">
        <h1 class="text-5xl font-black" x-text="t('contact')"></h1>
        <p class="text-slate-500" x-text="t('contactDesc')"></p>
        <div class="p-12 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm">
            <span class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-4" x-text="t('officialEmail')"></span>
            <a href="mailto:infoversehub@gmail.com" class="text-2xl font-black text-sky-600 hover:underline">infoversehub@gmail.com</a>
        </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
